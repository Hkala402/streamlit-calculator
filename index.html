<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Web Calculator</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0f;
      --panel: #12121a;
      --border: #2a2a3d;
      --accent: #00e5ff;
      --accent2: #ff4d6d;
      --text: #e8e8f0;
      --muted: #555570;
      --btn-bg: #1a1a28;
      --btn-hover: #22223a;
      --operator: #1e1e35;
      --operator-text: #00e5ff;
      --equal-bg: #00e5ff;
      --equal-text: #0a0a0f;
      --display-bg: #08080f;
      --radius: 16px;
      --shadow: 0 0 40px rgba(0, 229, 255, 0.08);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Syne', sans-serif;
      background-image:
        radial-gradient(ellipse at 20% 20%, rgba(0,229,255,0.04) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 80%, rgba(255,77,109,0.04) 0%, transparent 60%);
    }

    .calc-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
    }

    .calc-title {
      font-size: 12px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 400;
    }

    .calculator {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      width: 360px;
      box-shadow: var(--shadow), inset 0 1px 0 rgba(255,255,255,0.04);
    }

    /* DISPLAY */
    .display {
      background: var(--display-bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 20px 20px 16px;
      margin-bottom: 20px;
      min-height: 110px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .expression {
      font-family: 'Share Tech Mono', monospace;
      font-size: 13px;
      color: var(--muted);
      min-height: 18px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .result {
      font-family: 'Share Tech Mono', monospace;
      font-size: 42px;
      color: var(--text);
      text-align: right;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      letter-spacing: -1px;
      transition: color 0.2s;
    }

    .result.error { color: var(--accent2); font-size: 22px; }
    .result.computing { color: var(--muted); }

    /* GRID */
    .buttons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }

    button {
      background: var(--btn-bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: 'Syne', sans-serif;
      font-size: 16px;
      font-weight: 700;
      padding: 18px 0;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s, border-color 0.15s, box-shadow 0.15s;
      position: relative;
      overflow: hidden;
    }

    button:hover {
      background: var(--btn-hover);
      border-color: #3a3a55;
    }

    button:active {
      transform: scale(0.94);
      box-shadow: inset 0 2px 6px rgba(0,0,0,0.3);
    }

    /* Ripple effect */
    button::after {
      content: '';
      position: absolute;
      width: 100%; height: 100%;
      top: 0; left: 0;
      background: rgba(255,255,255,0.04);
      opacity: 0;
      transition: opacity 0.2s;
    }
    button:hover::after { opacity: 1; }

    /* Operator buttons */
    button.op {
      background: var(--operator);
      color: var(--operator-text);
      border-color: rgba(0, 229, 255, 0.2);
    }
    button.op:hover { background: #25253d; border-color: rgba(0,229,255,0.35); }

    /* Function buttons (AC, +/-, %) */
    button.fn {
      background: #1c1c2e;
      color: #aaaacc;
    }
    button.fn:hover { background: #222236; }

    /* Equal button */
    button.eq {
      background: var(--equal-bg);
      color: var(--equal-text);
      border: none;
      font-size: 20px;
      box-shadow: 0 4px 20px rgba(0, 229, 255, 0.3);
    }
    button.eq:hover {
      background: #33eeff;
      box-shadow: 0 4px 28px rgba(0, 229, 255, 0.5);
    }

    /* Wide button */
    button.wide { grid-column: span 2; }

    /* Footer */
    .calc-footer {
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 1px;
    }

    /* Loading dot animation */
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
    .computing-dot { animation: pulse 0.8s infinite; }
  </style>
</head>
<body>

<div class="calc-wrapper">
  <div class="calc-title">Web Calculator</div>

  <div class="calculator">
    <!-- DISPLAY SCREEN -->
    <div class="display">
      <div class="expression" id="expression">—</div>
      <div class="result" id="result">0</div>
    </div>

    <!-- BUTTONS GRID -->
    <div class="buttons">
      <!-- Row 1: functions -->
      <button class="fn" onclick="clearAll()">AC</button>
      <button class="fn" onclick="toggleSign()">+/−</button>
      <button class="fn" onclick="percent()">%</button>
      <button class="op" onclick="appendOp('/')">÷</button>

      <!-- Row 2 -->
      <button onclick="appendNum('7')">7</button>
      <button onclick="appendNum('8')">8</button>
      <button onclick="appendNum('9')">9</button>
      <button class="op" onclick="appendOp('*')">×</button>

      <!-- Row 3 -->
      <button onclick="appendNum('4')">4</button>
      <button onclick="appendNum('5')">5</button>
      <button onclick="appendNum('6')">6</button>
      <button class="op" onclick="appendOp('-')">−</button>

      <!-- Row 4 -->
      <button onclick="appendNum('1')">1</button>
      <button onclick="appendNum('2')">2</button>
      <button onclick="appendNum('3')">3</button>
      <button class="op" onclick="appendOp('+')">+</button>

      <!-- Row 5 -->
      <button class="wide" onclick="appendNum('0')">0</button>
      <button onclick="appendDot()">.</button>
      <button class="eq" onclick="calculate()">=</button>
    </div>
  </div>

  <div class="calc-footer">Powered by Flask + Python</div>
</div>

<script>
  // ─── STATE ───────────────────────────────────────────────────────────────────
  let expression = "";        // the math expression being built
  let justCalculated = false; // did we just press "=" ?

  // ─── DOM refs ────────────────────────────────────────────────────────────────
  const exprEl   = document.getElementById("expression");
  const resultEl = document.getElementById("result");

  // ─── HELPERS ─────────────────────────────────────────────────────────────────
  function updateDisplay() {
    exprEl.textContent = expression || "—";
  }

  function appendNum(n) {
    if (justCalculated) { expression = ""; justCalculated = false; }
    expression += n;
    resultEl.textContent = expression;
    resultEl.className = "result";
    updateDisplay();
  }

  function appendOp(op) {
    justCalculated = false;
    // Prevent double operators
    if (['+','-','*','/'].includes(expression.slice(-1))) {
      expression = expression.slice(0, -1);
    }
    expression += op;
    updateDisplay();
    resultEl.textContent = expression;
  }

  function appendDot() {
    // Only add dot if current number doesn't already have one
    const parts = expression.split(/[\+\-\*\/]/);
    if (!parts[parts.length - 1].includes('.')) {
      appendNum('.');
    }
  }

  function clearAll() {
    expression = "";
    justCalculated = false;
    resultEl.textContent = "0";
    resultEl.className = "result";
    exprEl.textContent = "—";
  }

  function toggleSign() {
    // Wrap entire expression in negation
    if (!expression) return;
    if (expression.startsWith("-(") && expression.endsWith(")")) {
      expression = expression.slice(2, -1);
    } else {
      expression = "-(" + expression + ")";
    }
    updateDisplay();
    resultEl.textContent = expression;
  }

  function percent() {
    if (!expression) return;
    expression = "(" + expression + ")/100";
    updateDisplay();
    resultEl.textContent = expression;
  }

  // ─── CALCULATE (calls Flask API) ─────────────────────────────────────────────
  async function calculate() {
    if (!expression) return;

    // Show "computing" state
    resultEl.textContent = "...";
    resultEl.className = "result computing";
    exprEl.textContent = expression;

    try {
      // POST the expression to Flask /calculate endpoint
      const response = await fetch("/calculate", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ expression: expression })
      });

      const data = await response.json();   // parse the JSON response

      if (data.error) {
        resultEl.textContent = data.error;
        resultEl.className = "result error";
      } else {
        resultEl.textContent = data.result;
        resultEl.className = "result";
        expression = data.result;           // allow chaining from result
        justCalculated = true;
      }
    } catch (err) {
      resultEl.textContent = "Network error";
      resultEl.className = "result error";
    }
  }

  // ─── KEYBOARD SUPPORT ────────────────────────────────────────────────────────
  document.addEventListener("keydown", (e) => {
    if (e.key >= "0" && e.key <= "9") appendNum(e.key);
    else if (e.key === "+") appendOp("+");
    else if (e.key === "-") appendOp("-");
    else if (e.key === "*") appendOp("*");
    else if (e.key === "/") { e.preventDefault(); appendOp("/"); }
    else if (e.key === ".") appendDot();
    else if (e.key === "Enter" || e.key === "=") calculate();
    else if (e.key === "Backspace") {
      expression = expression.slice(0, -1);
      resultEl.textContent = expression || "0";
      updateDisplay();
    }
    else if (e.key === "Escape") clearAll();
  });
</script>
</body>
</html>
